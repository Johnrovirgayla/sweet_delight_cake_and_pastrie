<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Cart - Sweet Delights</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <a href="../index.html" class="nav-logo">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <rect x="4" y="14" width="20" height="10" rx="2" fill="#e91e8c"/>
          <rect x="7" y="10" width="14" height="6" rx="1" fill="#f06ab0"/>
          <rect x="11" y="4" width="6" height="8" rx="1" fill="#e91e8c"/>
          <circle cx="14" cy="4" r="2" fill="#ff6eb4"/>
        </svg>
        Sweet Delights
      </a>
      <ul class="nav-links">
        <li><a href="../index.html">Home</a></li>
        <li><a href="shop.html">Shop</a></li>
        <li><a href="reservations.html">Reservations</a></li>
      </ul>
      <a href="cart.html" class="cart-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
          <line x1="3" y1="6" x2="21" y2="6"/>
          <path d="M16 10a4 4 0 01-8 0"/>
        </svg>
        <span class="cart-badge" id="cartBadge">0</span>
      </a>
    </div>
  </nav>

  <div class="cart-page">
    <h1>Shopping Cart</h1>
    <div id="cartContent"></div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="../js/products.js"></script>
  <script src="../js/cart.js"></script>
  <script>
    function renderCart() {
      const cart = getCart();
      const container = document.getElementById('cartContent');

      if (cart.length === 0) {
        container.innerHTML = `
          <div class="empty-cart">
            <div style="font-size:4rem;margin-bottom:16px">🛒</div>
            <h2>Your cart is empty</h2>
            <p style="color:var(--gray);margin-bottom:24px">Looks like you haven't added anything yet.</p>
            <a href="shop.html" style="display:inline-block;background:var(--black);color:white;padding:14px 28px;border-radius:10px;text-decoration:none;font-weight:700;">Browse Products</a>
          </div>
        `;
        return;
      }

      const total = getCartTotal();
      container.innerHTML = `
        <div class="cart-layout">
          <div class="cart-items">
            ${cart.map(item => `
              <div class="cart-item">
                <img src="${item.image}" alt="${item.name}" class="cart-item-image">
                <div class="cart-item-info">
                  <h4>${item.name}</h4>
                  <p>${item.category}</p>
                  <p class="cart-item-price">$${item.price.toFixed(2)}</p>
                </div>
                <div class="qty-controls">
                  <button class="qty-btn" onclick="changeQty(${item.id}, -1)">−</button>
                  <span class="qty-num">${item.qty}</span>
                  <button class="qty-btn" onclick="changeQty(${item.id}, 1)">+</button>
                </div>
                <button class="delete-btn" onclick="deleteItem(${item.id})">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="3 6 5 6 21 6"/>
                    <path d="M19 6l-1 14H6L5 6"/>
                    <path d="M10 11v6M14 11v6"/>
                    <path d="M9 6V4h6v2"/>
                  </svg>
                </button>
              </div>
            `).join('')}
          </div>
          <div class="order-summary">
            <h3>Order Summary</h3>
            ${cart.map(item => `
              <div class="summary-row">
                <span>${item.name} x${item.qty}</span>
                <span>$${(item.price * item.qty).toFixed(2)}</span>
              </div>
            `).join('')}
            <div class="summary-total">
              <span>Total</span>
              <span>$${total.toFixed(2)}</span>
            </div>
            <a href="checkout.html" class="btn-full">Proceed to Checkout</a>
            <a href="shop.html" class="btn-full-outline">Continue Shopping</a>
          </div>
        </div>
      `;
    }

    function changeQty(id, delta) {
      updateQty(id, delta);
      renderCart();
    }

    function deleteItem(id) {
      removeFromCart(id);
      renderCart();
    }

    document.addEventListener('DOMContentLoaded', renderCart);
  </script>
</body>
</html>
